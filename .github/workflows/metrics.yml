 # Generates github-metrics.svg for the profile README (lowlighter/metrics).
  # Requires a repo secret METRICS_TOKEN — classic PAT with: repo, read:org, read:user.
  # The token expires — renew it when the card stops updating.
  name: Metrics
  on:
    schedule: [{ cron: "0 14 * * *" }]   # daily, ~6–7am PT
    workflow_dispatch:                    # manual "Run workflow" button
    
  jobs:
    github-metrics:
      runs-on: ubuntu-latest
      permissions:
        contents: write
      steps:
        - uses: lowlighter/metrics@latest
          with: 
            token: ${{ secrets.METRICS_TOKEN }}
            user: Dunya-8a
            base: header, activity
            config_timezone: America/Los_Angeles
            repositories_affiliations: owner, collaborator, organization_member
            
            plugin_isocalendar: yes
            plugin_isocalendar_duration: full-year
            plugin_languages: yes
            plugin_languages_indepth: yes
            plugin_languages_sections: most-used
            plugin_languages_details: bytes-size, percentage
            plugin_languages_limit: 8 
