  name: Metrics
  on:
    schedule: [{ cron: "0 14 * * *" }]   # daily (~6–7am PT)
    workflow_dispatch:                    # manual "Run workflow" button
    push: { branches: ["main"] }          
    
  jobs:
    github-metrics:
      runs-on: ubuntu-latest
      permissions:
        contents: write
      steps:
        - uses: lowlighter/metrics@latest
          with: 
            token: ${{ secrets.METRICS_TOKEN }}
            user: Dunya-8a
            base: header, activity, community, repositories, metadata
            config_timezone: America/Los_Angeles
            repositories_affiliations: owner, collaborator, organization_member  # incl. private/org
            
            plugin_isocalendar: yes                 # 3D contribution calendar
            plugin_isocalendar_duration: full-year  
            plugin_languages: yes
            plugin_languages_details: percentage
            plugin_languages_limit: 8 
            plugin_lines: yes                       # lines changed
            plugin_activity: yes                    
            plugin_activity_limit: 5
            plugin_habits: yes                      # busiest days/hours
            plugin_habits_charts: yes
