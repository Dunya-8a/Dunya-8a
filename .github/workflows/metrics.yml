  name: Metrics
  on:
    schedule: [{ cron: "0 14 * * *" }]
    workflow_dispatch:
    push: { branches: ["main"] }

  jobs:
    github-metrics:
      runs-on: ubuntu-latest
      permissions:
        contents: write
      steps:
        - uses: lowlighter/metrics@latest
          with:
            token: ${{ secrets.METRICS_TOKEN }}
            user: Dunya-8a
            base: header, activity                # 2,731 commits + 42 PRs; drops the 0-heavy sections
            config_timezone: America/Los_Angeles
            repositories_affiliations: owner, collaborator, organization_member

            plugin_isocalendar: yes               # 3D calendar + streaks + commits/day (your strongest)
            plugin_isocalendar_duration: full-year
            plugin_languages: yes
            plugin_languages_details: percentage
            plugin_languages_limit: 8
            # removed: plugin_habits + plugin_activity (errored), plugin_lines (showed 0)
